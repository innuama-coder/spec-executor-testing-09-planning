version: "2.3"
name: "development-planning-quality-dashboard"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-09-planning.git"
  branch: "main"
task_dir: "tasks/development-planning"
executor: "claude"
execution:
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_duration_min: 15
  max_nudge_count: 3
  max_consecutive_escalate: 2
  env:
    file: "ENV"
    required: false
    privacy: "redacted"
  agent:
    id: "development-planning-agent"
    name: "development-planning-agent"
    role: "生成开发任务规划，保证测试、依赖、并行与验收标准完整。"
    model:
      preference: "default"
    instructions:
      - "failure handoff、capture evidence、Claude planning Agent。"
      - "严格遵守任务包中的 PROMPT、AGENTS、CLAUDE 与 docs 上下文。"
      - "ENV 仅用于进程环境注入，不得作为上下文文件读取或在默认输出中泄漏变量值。"
      - "若存在 review items，必须在同一 JOB 内完成修复、验证和交付说明更新。"
    context:
      files:
        - "PROMPT.md"
        - "AGENTS.md"
        - "CLAUDE.md"
      exclude:
        - "ENV"
    tools:
      allow:
        - "shell"
        - "apply_patch"
      deny:
        - "network"
    permissions:
      filesystem: "workspace-write"
      network: "deny"
      approval: "on-request"
  review:
    max_iterations: 2
    items:
      - id: "REV-DEVPLAN-001"
        source: "external-review"
        severity: "must"
        target: "plans/development-plan.md"
        description: "开发规划必须包含测试策略和验收标准。"
        expected_fix: "补齐测试策略、依赖关系、并行批次和停止条件。"
        evidence_refs:
          - "PROMPT.md"
        acceptance:
          command: "grep -q \"测试\" plans/development-plan.md && grep -q \"验收\" plans/development-plan.md"
  lifecycle:
    resume:
      require_same_job: true
    monitoring:
      busy_side_effect: "observe_only"
      source_degraded_policy: "bounded_failure"
      screen_capture_semantic_fallback: false
    capture:
      default_raw_output: false
      failure_evidence: true
verification:
  pass_threshold: 1
  commands:
    - "test -s plans/development-plan.md"
    - "grep -q \"测试\" plans/development-plan.md"
    - "grep -q \"依赖\" plans/development-plan.md"
    - "grep -q \"验收\" plans/development-plan.md"
    - "grep -q \"并行\" plans/development-plan.md"
    - "grep -q \"停止\" plans/development-plan.md"
reporting:
  format: "markdown"
  include_evidence_refs: true
  redact_env_values: true
  include_handoff: true
deliverables:
  - path: "plans/development-plan.md"
    verify: "test -s plans/development-plan.md && grep -q \"测试\" plans/development-plan.md && grep -q \"依赖\" plans/development-plan.md && grep -q \"验收\" plans/development-plan.md && grep -q \"并行\" plans/development-plan.md && grep -q \"停止\" plans/development-plan.md"
