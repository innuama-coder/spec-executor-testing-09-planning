version: "2.3"
name: "development-planning-quality-dashboard"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-09-planning.git"
  branch: "main"
task_dir: "tasks/development-planning"
deliverables:
- path: "plans/development-plan.md"
  verify: "test -s plans/development-plan.md && grep -q \"测试\" plans/development-plan.md
    && grep -q \"依赖\" plans/development-plan.md && grep -q \"验收\" plans/development-plan.md
    && grep -q \"并行\" plans/development-plan.md && grep -q \"停止\" plans/development-plan.md"
execution:
  executor: "claude"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "development-planning-agent"
    role: "生成开发任务规划，保证测试、依赖、并行与验收标准完整。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items:
    - id: "REV-DEVPLAN-001"
      source: "external-review"
      severity: "must"
      target: "plans/development-plan.md"
      issue: "开发规划必须包含测试策略和验收标准。"
      expected_fix: "补齐测试策略、依赖关系、并行批次和停止条件。"
      acceptance: "grep -q \"测试\" plans/development-plan.md && grep -q \"验收\" plans/development-plan.md"
verification:
  commands:
  - "test -s plans/development-plan.md"
  - "grep -q \"测试\" plans/development-plan.md"
  - "grep -q \"依赖\" plans/development-plan.md"
  - "grep -q \"验收\" plans/development-plan.md"
  - "grep -q \"并行\" plans/development-plan.md"
  - "grep -q \"停止\" plans/development-plan.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: false
