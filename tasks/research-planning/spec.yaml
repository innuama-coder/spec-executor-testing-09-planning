version: "2.3"
name: "research-planning-quality-dashboard"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-09-planning.git"
  branch: "main"
task_dir: "tasks/research-planning"
deliverables:
- path: "plans/research-plan.md"
  verify: "test -s plans/research-plan.md && grep -q \"依赖\" plans/research-plan.md
    && grep -q \"验收\" plans/research-plan.md && grep -q \"并行\" plans/research-plan.md
    && grep -q \"停止\" plans/research-plan.md"
execution:
  executor: "claude"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "research-planning-agent"
    role: "生成研究规划任务，保证依赖、并行、停止条件与验收边界完整。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items: []
verification:
  commands:
  - "test -s plans/research-plan.md"
  - "grep -q \"依赖\" plans/research-plan.md"
  - "grep -q \"验收\" plans/research-plan.md"
  - "grep -q \"并行\" plans/research-plan.md"
  - "grep -q \"停止\" plans/research-plan.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: false
