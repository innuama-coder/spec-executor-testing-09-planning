version: "2.0"
name: "design-planning-quality-dashboard"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-09-planning.git"
  branch: "main"
task_dir: "tasks/design-planning"
executor: "codex"
deliverables:
  - path: "plans/design-plan.md"
    verify: "test -s plans/design-plan.md && grep -q \"依赖\" plans/design-plan.md && grep -q \"验收\" plans/design-plan.md && grep -q \"并行\" plans/design-plan.md && grep -q \"停止\" plans/design-plan.md"
execution:
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_duration_min: 15
  max_nudge_count: 3
  max_consecutive_escalate: 2
