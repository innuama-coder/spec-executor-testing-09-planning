version: "2.3"
name: "design-planning-quality-dashboard"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-09-planning.git"
  branch: "main"
task_dir: "tasks/design-planning"
deliverables:
- path: "plans/design-plan.md"
  verify: "test -s plans/design-plan.md && grep -q \"依赖\" plans/design-plan.md &&
    grep -q \"验收\" plans/design-plan.md && grep -q \"并行\" plans/design-plan.md &&
    grep -q \"停止\" plans/design-plan.md"
execution:
  executor: "codex"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "design-planning-agent"
    role: "生成设计任务规划，保证 DAG、并行执行、停止条件和验收标准完整。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items:
    - id: "REV-PLAN-001"
      source: "external-review"
      severity: "must"
      target: "plans/design-plan.md"
      issue: "规划必须明确依赖、并行与停止条件。"
      expected_fix: "补齐 DAG、并行批次、验收标准和停止条件。"
      acceptance: "grep -q \"依赖\" plans/design-plan.md && grep -q \"并行\" plans/design-plan.md
        && grep -q \"停止\" plans/design-plan.md"
verification:
  commands:
  - "test -s plans/design-plan.md"
  - "grep -q \"依赖\" plans/design-plan.md"
  - "grep -q \"验收\" plans/design-plan.md"
  - "grep -q \"并行\" plans/design-plan.md"
  - "grep -q \"停止\" plans/design-plan.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: false
